name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      # ── CV PDF ────────────────────────────────────────────────────
      # Non-blocking: if the PDF build fails the site still deploys.
      - name: Generate CV LaTeX from cv.json
        id: cv-tex
        continue-on-error: true
        run: node scripts/build-cv.mjs

      - name: Compile CV PDF
        id: cv-pdf
        if: steps.cv-tex.outcome == 'success'
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: build/cv

      - name: Stage CV PDF into public/
        if: steps.cv-pdf.outcome == 'success'
        continue-on-error: true
        run: |
          mkdir -p public
          cp build/cv/cv.pdf public/cv.pdf
          ls -la public/cv.pdf

      # ── Astro site ────────────────────────────────────────────────
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
